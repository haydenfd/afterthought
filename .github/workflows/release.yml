name: Release installers

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.platform }} installers
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS
            os: macos-latest
            target: mac
          - platform: Windows
            os: windows-latest
            target: win
          - platform: Linux
            os: ubuntu-latest
            target: linux

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Package installers
        run: npx electron-builder --${{ matrix.target }} --publish never

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.target }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          pattern: installers-*
          path: release-assets
          merge-multiple: true

      - name: Create release and upload installers
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Afterthought $GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag
          find release-assets -type f -print0 \
            | xargs -0 -n 1 gh release upload "$GITHUB_REF_NAME" \
                --repo "$GITHUB_REPOSITORY"
