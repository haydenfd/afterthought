appId: com.afterthought.app
productName: Afterthought
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
asar: true
asarUnpack:
  - node_modules/supermemory/**/*

directories:
  output: release
  buildResources: resources

files:
  - out/**/*
  - package.json

extraResources:
  - from: resources/icon.png
    to: icon.png

mac:
  category: public.app-category.lifestyle
  icon: resources/icon.icns
  identity: null
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64

dmg:
  sign: false

win:
  icon: resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

linux:
  icon: resources/icon.png
  category: Utility
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64

publish:
  provider: github
  owner: haydenfd
  repo: afterthought
  releaseType: release
